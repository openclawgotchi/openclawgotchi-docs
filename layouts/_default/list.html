<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .content {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 24px;
            font-weight: 700;
        }
        
        .page-list {
            list-style: none;
        }
        
        .page-list li {
            margin-bottom: 16px;
        }
        
        .page-link {
            display: block;
            padding: 16px;
            background: #f7fafc;
            border-radius: 8px;
            text-decoration: none;
            color: #4a5568;
            transition: all 0.3s ease;
        }
        
        .page-link:hover {
            background: #667eea;
            color: white;
            transform: translateX(8px);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        
        <div class="content">
            <h1>{{ .Title }}</h1>
            
            {{ if .Content }}
                {{ .Content }}
            {{ end }}
            
            <ul class="page-list">
                {{ range .Pages }}
                    <li>
                        <a href="{{ .RelPermalink }}" class="page-link">
                            <strong>{{ .Title }}</strong>
                            {{ if .Description }}
                                <br><small>{{ .Description }}</small>
                            {{ end }}
                        </a>
                    </li>
                {{ end }}
            </ul>
        </div>
    </div>
</body>
</html>
